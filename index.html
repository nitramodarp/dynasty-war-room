<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynasty War Room</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --surface3: #22223a;
    --border: #2a2a40;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --accent3: #7fff6b;
    --gold: #ffd700;
    --text: #e8e8f0;
    --text-dim: #8888aa;
    --text-muted: #555570;
    --red: #ff4444;
    --orange: #ff8c42;
    --yellow: #ffd700;
    --green: #4cff91;
    --blue: #4ca9ff;
    --purple: #b44cff;

    /* Archetype colors */
    --young: #4ca9ff;
    --peak: #4cff91;
    --aging: #ffd700;
    --sell: #ff4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #0a0a0f 0%, #12121a 50%, #0a0a1f 100%);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .header-logo {
    font-family: 'Bebas Neue', cursive;
    font-size: 28px;
    letter-spacing: 3px;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .sync-btn {
    background: linear-gradient(135deg, var(--accent), var(--purple));
    border: none;
    border-radius: 6px;
    color: #000;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 8px 16px;
    cursor: pointer;
    text-transform: uppercase;
    transition: opacity 0.2s;
  }

  .sync-btn:hover { opacity: 0.85; }
  .sync-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .last-sync {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
  }

  /* NAV */
  .nav {
    display: flex;
    gap: 2px;
    padding: 0 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }

  .nav-tab {
    padding: 12px 20px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }

  .nav-tab:hover { color: var(--text); }
  .nav-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* MAIN */
  .main {
    padding: 24px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* LOADING */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    gap: 24px;
  }

  .loading-logo {
    font-family: 'Bebas Neue', cursive;
    font-size: 64px;
    letter-spacing: 6px;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .loading-bar-wrap {
    width: 300px;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .loading-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--purple));
    width: 0%;
    transition: width 0.3s ease;
  }

  .loading-status {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }

  .card-title {
    font-family: 'Bebas Neue', cursive;
    font-size: 20px;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* GRID LAYOUTS */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

  /* STAT CARDS */
  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
  }

  .stat-value {
    font-family: 'Bebas Neue', cursive;
    font-size: 36px;
    letter-spacing: 2px;
    line-height: 1;
  }

  .stat-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-top: 4px;
  }

  .stat-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* TABLES */
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .data-table th {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }

  .data-table th:hover { color: var(--accent); }

  .data-table td {
    padding: 8px 12px;
    border-bottom: 1px solid rgba(42,42,64,0.5);
    vertical-align: middle;
  }

  .data-table tr:hover td { background: var(--surface2); }
  .data-table tr:last-child td { border-bottom: none; }

  /* ARCHETYPE BADGES */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .badge-young { background: rgba(76,169,255,0.15); color: var(--blue); border: 1px solid rgba(76,169,255,0.3); }
  .badge-peak { background: rgba(76,255,145,0.15); color: var(--green); border: 1px solid rgba(76,255,145,0.3); }
  .badge-aging { background: rgba(255,215,0,0.15); color: var(--yellow); border: 1px solid rgba(255,215,0,0.3); }
  .badge-sell { background: rgba(255,68,68,0.15); color: var(--red); border: 1px solid rgba(255,68,68,0.3); }
  .badge-taxi { background: rgba(180,76,255,0.15); color: var(--purple); border: 1px solid rgba(180,76,255,0.3); }

  /* VORP BAR */
  .vorp-bar {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .vorp-track {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: visible;
    position: relative;
    min-width: 60px;
  }

  .vorp-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s;
  }

  .vorp-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    white-space: nowrap;
    min-width: 55px;
    text-align: right;
  }

  /* POS PILL */
  .pos-pill {
    display: inline-block;
    width: 28px;
    height: 20px;
    border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    text-align: center;
    line-height: 20px;
  }

  .pos-QB { background: rgba(255,107,53,0.2); color: var(--accent2); }
  .pos-RB { background: rgba(76,255,145,0.2); color: var(--green); }
  .pos-WR { background: rgba(76,169,255,0.2); color: var(--blue); }
  .pos-TE { background: rgba(255,215,0,0.2); color: var(--gold); }

  /* POWER RANKINGS */
  .team-rank-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 8px;
    transition: all 0.2s;
    cursor: pointer;
  }

  .team-rank-card:hover { border-color: var(--accent); transform: translateX(4px); }
  .team-rank-card.my-team { border-color: var(--accent); background: rgba(0,212,255,0.05); }

  .rank-num {
    font-family: 'Bebas Neue', cursive;
    font-size: 32px;
    color: var(--text-muted);
    min-width: 40px;
    text-align: center;
    line-height: 1;
  }

  .rank-num.top3 { color: var(--gold); }

  .team-info { flex: 1; }
  .team-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
  .team-archetype { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-dim); }

  .team-stats {
    display: flex;
    gap: 24px;
    text-align: right;
  }

  .team-stat { }
  .team-stat-val {
    font-family: 'Bebas Neue', cursive;
    font-size: 20px;
    letter-spacing: 1px;
    line-height: 1;
  }
  .team-stat-lbl {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* TRADE ANALYZER */
  .trade-side {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }

  .trade-side-title {
    font-family: 'Bebas Neue', cursive;
    font-size: 16px;
    letter-spacing: 2px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .trade-total {
    font-size: 24px;
    color: var(--accent);
  }

  .trade-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }

  .trade-search {
    flex: 1;
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .trade-search:focus { border-color: var(--accent); }

  .trade-search::placeholder { color: var(--text-muted); }

  .add-btn {
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--accent);
    cursor: pointer;
    font-size: 18px;
    width: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .add-btn:hover { background: rgba(0,212,255,0.1); border-color: var(--accent); }

  .autocomplete-list {
    position: absolute;
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 6px;
    max-height: 200px;
    overflow-y: auto;
    z-index: 50;
    width: 100%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  .autocomplete-item {
    padding: 8px 12px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    gap: 8px;
  }

  .autocomplete-item:hover { background: rgba(0,212,255,0.1); }

  .autocomplete-wrap { position: relative; flex: 1; }

  .trade-asset-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px;
    background: var(--surface3);
    border-radius: 6px;
    margin-bottom: 4px;
    font-size: 12px;
    gap: 8px;
  }

  .remove-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 14px;
    padding: 0 4px;
    transition: color 0.2s;
  }

  .remove-btn:hover { color: var(--red); }

  .trade-verdict {
    background: var(--surface2);
    border-radius: 10px;
    padding: 20px;
    text-align: center;
    margin-top: 16px;
    border: 1px solid var(--border);
  }

  .verdict-label {
    font-family: 'Bebas Neue', cursive;
    font-size: 28px;
    letter-spacing: 3px;
    margin-bottom: 8px;
  }

  .verdict-detail {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.8;
  }

  .verdict-bar-wrap {
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    margin: 12px 0;
    overflow: hidden;
    position: relative;
  }

  .verdict-bar-a {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    background: var(--accent2);
    border-radius: 4px 0 0 4px;
    transition: width 0.5s ease;
  }

  .verdict-bar-b {
    position: absolute;
    right: 0;
    top: 0;
    height: 100%;
    background: var(--accent);
    border-radius: 0 4px 4px 0;
    transition: width 0.5s ease;
  }

  /* PICK SELECT */
  .pick-select {
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 8px 12px;
    outline: none;
    cursor: pointer;
    width: 100%;
  }

  .pick-select:focus { border-color: var(--accent); }

  /* DRAFT PICKS TABLE */
  .pick-year-section { margin-bottom: 24px; }

  .pick-year-header {
    font-family: 'Bebas Neue', cursive;
    font-size: 24px;
    letter-spacing: 3px;
    color: var(--accent);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .picks-grid {
    display: grid;
    grid-template-columns: 120px repeat(12, 1fr);
    gap: 4px;
    font-size: 11px;
  }

  .picks-grid-header {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
    text-align: center;
    padding: 4px;
    letter-spacing: 0.5px;
  }

  .picks-grid-round {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    padding: 6px 8px;
    display: flex;
    align-items: center;
  }

  .pick-cell {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 4px;
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    line-height: 1.3;
    transition: all 0.2s;
  }

  .pick-cell.own-pick { border-color: rgba(76,255,145,0.3); background: rgba(76,255,145,0.05); }
  .pick-cell.traded-away { border-color: rgba(255,68,68,0.3); background: rgba(255,68,68,0.05); }
  .pick-cell.traded-to-me { border-color: rgba(0,212,255,0.3); background: rgba(0,212,255,0.08); }

  .pick-owner { color: var(--text-dim); font-size: 8px; }
  .pick-value { color: var(--accent); font-size: 10px; font-weight: 600; }

  /* SECTION FILTERS */
  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.5px;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .filter-btn:hover { color: var(--text); border-color: var(--text-muted); }
  .filter-btn.active { background: rgba(0,212,255,0.1); border-color: var(--accent); color: var(--accent); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
    .team-stats { gap: 12px; }
    .main { padding: 16px; }
  }

  .error-msg {
    background: rgba(255,68,68,0.1);
    border: 1px solid rgba(255,68,68,0.3);
    border-radius: 8px;
    padding: 16px;
    color: var(--red);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    margin-bottom: 16px;
  }

  .pulse {
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .green { color: var(--green); }
  .red { color: var(--red); }
  .yellow { color: var(--yellow); }
  .blue { color: var(--blue); }
  .gold { color: var(--gold); }
  .dim { color: var(--text-dim); }
  .muted { color: var(--text-muted); }

  .text-right { text-align: right; }
  .text-center { text-align: center; }
  .mono { font-family: 'IBM Plex Mono', monospace; }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 20px 0;
  }

  .tag {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 3px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.5px;
    margin-left: 4px;
  }

  .tag-taxi { background: rgba(180,76,255,0.2); color: var(--purple); }
  .tag-rookie { background: rgba(255,215,0,0.2); color: var(--gold); }
  .tag-inj { background: rgba(255,68,68,0.2); color: var(--red); border: 1px solid rgba(255,68,68,0.3); }
  .tag-role { background: rgba(255,140,66,0.2); color: var(--orange); border: 1px solid rgba(255,140,66,0.3); }
  .tag-new-team { background: rgba(180,76,255,0.2); color: var(--purple); border: 1px solid rgba(180,76,255,0.3); }
  .flag-tooltip { position:relative; display:inline-block; }
  .flag-tooltip .tooltip-text {
    visibility:hidden; opacity:0; transition:opacity 0.15s;
    background:var(--surface3); color:var(--text); border:1px solid var(--border);
    border-radius:6px; padding:6px 10px; font-size:11px; white-space:nowrap;
    position:absolute; z-index:200; bottom:125%; left:50%; transform:translateX(-50%);
    pointer-events:none; box-shadow:0 4px 16px rgba(0,0,0,0.5);
  }
  .flag-tooltip:hover .tooltip-text { visibility:visible; opacity:1; }

  .alerts-banner { margin-bottom: 20px; }
  .alerts-banner-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .alerts-banner-title { font-family:'Bebas Neue',cursive; font-size:18px; letter-spacing:2px; color:var(--red); display:flex; align-items:center; gap:8px; }
  .alerts-banner-title.all-clear { color:var(--green); }
  .alert-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 16px; display:flex; align-items:center; gap:16px; margin-bottom:8px; transition:transform 0.15s; }
  .alert-card:hover { transform:translateX(3px); }
  .alert-card.priority-0 { border-left:4px solid var(--red); background:rgba(255,68,68,0.04); }
  .alert-card.priority-1 { border-left:4px solid var(--orange); background:rgba(255,140,66,0.04); }
  .alert-card.priority-2 { border-left:4px solid var(--yellow); background:rgba(255,215,0,0.03); }
  .alert-icon { font-size:20px; min-width:28px; text-align:center; }
  .alert-body { flex:1; }
  .alert-player { font-weight:600; font-size:13px; margin-bottom:2px; }
  .alert-detail { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--text-dim); line-height:1.5; }
  .alert-countdown { text-align:right; min-width:80px; }
  .alert-countdown-num { font-family:'Bebas Neue',cursive; font-size:28px; line-height:1; }
  .alert-countdown-label { font-family:'IBM Plex Mono',monospace; font-size:9px; color:var(--text-muted); letter-spacing:0.5px; text-transform:uppercase; }
  .alert-countdown-bar { height:3px; background:var(--border); border-radius:2px; margin-top:4px; overflow:hidden; }
  .alert-countdown-fill { height:100%; border-radius:2px; }

  /* HISTORICAL DNA */
